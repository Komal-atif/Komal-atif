<svg xmlns="http://www.w3.org/2000/svg" width="900" height="210" viewBox="0 0 900 210">

  <defs>
    <pattern id="gridConnect2" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#262626" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="900" height="210" fill="#0a0a0a"/>
  <rect width="900" height="210" fill="url(#gridConnect2)"/>


  <rect x="80" y="10" width="740" height="190" rx="6" fill="#111111" stroke="#262626" stroke-width="1.2"/>

  <!-- title bar -->
  <rect x="80" y="10" width="740" height="32" rx="6" fill="#161616"/>
  <rect x="80" y="36" width="740" height="6" fill="#161616"/>
  <circle cx="100" cy="26" r="5" fill="#c41e3a"/>
  <circle cx="118" cy="26" r="5" fill="#737373" opacity="0.5"/>
  <circle cx="136" cy="26" r="5" fill="#737373" opacity="0.5"/>
  <text x="450.0" y="31" text-anchor="middle" font-family="'Space Grotesk',monospace"
        font-size="11" letter-spacing="1.5" fill="#737373">contact.sh — komal@atif</text>


  <text x="106" y="74" font-family="'Space Grotesk',monospace" font-size="13" fill="#737373" opacity="0">
    <tspan fill="#c41e3a">$</tspan><tspan dx="8" fill="#fafafa">whoami</tspan>
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="0.70s" begin="0s" fill="freeze"/>
  </text>

  <text x="124" y="90" font-family="'Inter',monospace" font-size="12" fill="#737373" opacity="0">
    komal atif — software engineer
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="1.20s" begin="0s" fill="freeze"/>
  </text>

  <text x="106" y="106" font-family="'Space Grotesk',monospace" font-size="13" fill="#737373" opacity="0">
    <tspan fill="#c41e3a">$</tspan><tspan dx="8" fill="#fafafa">cat email.txt</tspan>
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="2.00s" begin="0s" fill="freeze"/>
  </text>

  <text x="124" y="122" font-family="'Inter',monospace" font-size="12" fill="#fafafa" opacity="0">
    komal1080atif@gmail.com
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="2.50s" begin="0s" fill="freeze"/>
  </text>

  <line x1="124" y1="126" x2="124" y2="126" stroke="#c41e3a" stroke-width="1.5" opacity="0">
    <animate attributeName="x2" values="124;271.20000000000005" dur="0.6s" begin="2.50s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.50s" fill="freeze"/>
  </line>

  <text x="106" y="138" font-family="'Space Grotesk',monospace" font-size="13" fill="#737373" opacity="0">
    <tspan fill="#c41e3a">$</tspan><tspan dx="8" fill="#fafafa">open linkedin</tspan>
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="3.30s" begin="0s" fill="freeze"/>
  </text>

  <text x="124" y="154" font-family="'Inter',monospace" font-size="12" fill="#fafafa" opacity="0">
    linkedin.com/in/komal-atif-5255242a8
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="3.80s" begin="0s" fill="freeze"/>
  </text>

  <line x1="124" y1="158" x2="124" y2="158" stroke="#c41e3a" stroke-width="1.5" opacity="0">
    <animate attributeName="x2" values="124;354.4" dur="0.6s" begin="3.80s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.80s" fill="freeze"/>
  </line>

  <text x="106" y="170" font-family="'Space Grotesk',monospace" font-size="13" fill="#737373" opacity="0">
    <tspan fill="#c41e3a">$</tspan><tspan dx="8" fill="#fafafa">open github</tspan>
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="4.60s" begin="0s" fill="freeze"/>
  </text>

  <text x="124" y="186" font-family="'Inter',monospace" font-size="12" fill="#fafafa" opacity="0">
    github.com/Komal-atif
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="5.10s" begin="0s" fill="freeze"/>
  </text>

  <line x1="124" y1="190" x2="124" y2="190" stroke="#c41e3a" stroke-width="1.5" opacity="0">
    <animate attributeName="x2" values="124;258.4" dur="0.6s" begin="5.10s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="5.10s" fill="freeze"/>
  </line>

  <text x="106" y="202" font-family="'Space Grotesk',monospace" font-size="13" fill="#c41e3a" opacity="0">
    <tspan>$</tspan>
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="5.6s" begin="0s" fill="freeze"/>
  </text>
  <rect x="120" y="191" width="8" height="14" fill="#fafafa" opacity="0">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.001;1" dur="5.6s" begin="0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="5.6s" repeatCount="indefinite"/>
  </rect>

</svg>